name: Release Charts

on:
  push:
    branches:
      - main

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.5.0
        with:
          config: cr.yaml
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Push and sign charts
        run: |
          set -euo pipefail
          test -d .cr-release-packages || { echo '.cr-release-packages does not exist'; exit 0; }
          repo="ghcr.io/${{ github.repository }}"
          for pkg in .cr-release-packages/*.tgz; do
            chart=$(helm show chart "$pkg" | sed -n 's/^name: //p')
            digest=$(helm push "$pkg" "oci://${repo}" 2>&1 | tee /dev/stderr | sed -n 's/^Digest: //p')
            cosign sign --yes "${repo}/${chart}@${digest}"
          done
